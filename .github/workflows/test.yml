name: Test CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip3 install -r requirement.txt

      - name: Executar testes unitários
        run: pytest -m unit --tb=short --junitxml=report-unit.xml

      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-unit
          path: report-unit.xml
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      DATABASE_URL: ${{ vars.DATABASE_URL }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip3 install -r requirement.txt

      - name: Executar testes de integração
        run: pytest -m integration --tb=short --junitxml=report-integration.xml

      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-integration
          path: report-integration.xml      