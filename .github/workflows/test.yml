name: Test CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: pip3 install -r requirement.txt
      - name: Run Unit Testes
        run: pytest -m unit -v