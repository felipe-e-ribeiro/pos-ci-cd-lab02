name: Test CI

on:
  push:
    branches: [ "main" ]
  pull_request:

  
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: pip3 install -r requirements.txt

      - name: Executar testes unitários
        run: pytest -m unit --tb=short --junitxml=report-unit.xml

      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-unit
          path: report-unit.xml
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: pip3 install -r requirements.txt

      - name: Executar testes de integração
        run: pytest -m integration --tb=short --junitxml=report-integration.xml

      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-integration
          path: report-integration.xml
  smoke-test:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Smoke test — verificar integridade do módulo
        run: |
          resultado=(python src/calculadora.py --preco 100 --desconto 10 --aliquota 10)
          if [[ "$resultado" != "106.2" ]]; then
            echo "Smoke test falhou: resultado esperado 106.2, mas obteve $resultado"
            exit 1
          fi